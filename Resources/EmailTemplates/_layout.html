<!DOCTYPE html>
<html lang="{{locale}}">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>P4PDF</title>
</head>
<body style="background-color:#f8fafc;margin:0;padding:24px 0;font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#0f172a;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
    <tr>
      <td align="center">
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="560" style="max-width:560px;background-color:#ffffff;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;">
          <tr>
            <td style="padding:20px 32px;border-bottom:1px solid #e2e8f0;">
              <div style="font-size:18px;font-weight:700;color:#0f172a;letter-spacing:-0.01em;">P4PDF</div>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 32px 16px;">
              {{body}}
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px;border-top:1px solid #e2e8f0;">
              <p style="margin:0;font-size:13px;color:#64748b;">{{footer_signature}}</p>
              <p style="margin:6px 0 0;font-size:12px;color:#64748b;">{{footer_company}}</p>
              <p style="margin:6px 0 0;font-size:12px;color:#64748b;">{{footer_unsubscribe}} {{footer_support}}</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
